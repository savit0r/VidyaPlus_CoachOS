version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coachOS_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coachOS
      POSTGRES_PASSWORD: coachOS_dev_2026
      POSTGRES_DB: coachOS_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: coachOS_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
